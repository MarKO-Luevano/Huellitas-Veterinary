name: Deploy Huellitas a EC2 con Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Construir y Desplegar en EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen del Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: k8s/Dockerfile.frontend
          push: true
          tags: marcohub/huellitas-frontend:latest

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Desplegar en EC2 con Kubernetes
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "Actualizando manifiestos en la EC2..."
            cd ~/Huellitas-Veterinary
            git pull origin main

            echo "Forzando a Kubernetes a descargar la nueva imagen de Docker Hub..."
            kubectl rollout restart deployment/frontend -n huellitas
            
            echo "Esperando que los pods estén listos..."
            kubectl rollout status deployment/frontend -n huellitas

            echo "Despliegue completado exitosamente."
          EOF
