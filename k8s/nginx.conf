server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirigir todas las rutas al index.html (necesario para React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend para las peticiones de API
    location /api/ {
        proxy_pass http://backend-service:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
