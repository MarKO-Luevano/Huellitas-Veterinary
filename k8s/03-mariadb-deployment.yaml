---
# POD 1: Base de datos MariaDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: huellitas
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Verificar que la DB este lista antes de aceptar trafico
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mariadb -u$MYSQL_USER -p$MYSQL_PASSWORD -e 'SELECT 1'"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: mariadb-storage
          persistentVolumeClaim:
            claimName: mariadb-pvc

---
# Servicio interno para que el backend pueda conectarse a la DB
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
  namespace: huellitas
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
  # ClusterIP = solo accesible dentro del cluster (correcto para una DB)
  type: ClusterIP
